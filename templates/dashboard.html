<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-slate-100 font-sans text-right" dir="rtl">
    <nav class="bg-blue-700 p-4 text-white flex justify-between px-10 items-center">
        <h1 class="text-xl font-bold italic text-orange-400">CyberVault</h1>
        <a href="/logout" class="bg-red-500 px-4 py-1 rounded text-sm font-bold">تسجيل خروج</a>
    </nav>
    <div class="container mx-auto p-6">
        <div class="bg-white p-6 rounded-xl shadow mb-8 border-r-8 border-orange-400">
            <h2 class="text-lg font-bold mb-4 text-blue-800">إضافة حساب جديد</h2>
            <form action="/add" method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" name="site" placeholder="اسم الموقع" class="border p-2 rounded" required>
                <input type="text" name="user" placeholder="اسم المستخدم" class="border p-2 rounded" required>
                <input type="password" name="pass" placeholder="كلمة المرور" class="border p-2 rounded" required>
                <button class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">تشفير وحفظ</button>
            </form>
        </div>
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full">
                <thead class="bg-blue-50 text-blue-900 font-bold border-b">
                    <tr>
                        <th class="p-4">الموقع</th>
                        <th class="p-4">اسم المستخدم</th>
                        <th class="p-4">كلمة المرور المشفرة</th>
                    </tr>
                </thead>
                <tbody>
                    {% for acc in accounts %}
                    <tr class="hover:bg-gray-50 border-b transition">
                        <td class="p-4 font-bold">{{ acc.site }}</td>
                        <td class="p-4 text-gray-700">{{ acc.user }}</td>
                        <td class="p-4"><span class="bg-orange-100 text-orange-800 px-3 py-1 rounded font-mono">{{ acc.pass }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
