<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-blue-900 flex items-center justify-center h-screen text-right" dir="rtl">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-t-8 border-orange-500">
        <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">دخول الخزنة الآمنة 🛡️</h1>
        <form method="POST">
            <input type="password" name="master_pass" placeholder="كلمة المرور الرئيسية" class="w-full p-3 border rounded-lg mb-4">
            <button class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition">فتح القفل</button>
        </form>
        {% with messages = get_flashed_messages() %}{% if messages %}
            <p class="text-red-500 mt-4 text-center">{{ messages[0] }}</p>
        {% endif %}{% endwith %}
    </div>
</body>
